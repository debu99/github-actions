name: 'Lambda Deployment Action'
description: 'A composite action to build and deploy a Lambda function'

inputs:
  aws_account_id:
    required: true
    description: 'The AWS account ID'
  aws_region:
    required: true
    description: 'The AWS region to deploy the Lambda function'
  aws_iam_role:
    required: true
    description: 'The IAM role to assume'
  lambda_bucket:
    required: true
    description: 'The S3 bucket to store the Lambda function code'
  function_name:
    required: true
    description: 'The name of the Lambda function'
  workdir:
    required: true
    description: 'The directory containing the Lambda function code'
  language:
    required: false
    description: 'The language of the Lambda function'
    default: 'python'
  version:
    required: false
    description: 'The version to use'
    default: '3.12'

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set Environment Variable
      shell: bash
      run: |
        COMMIT_SHA=${GITHUB_SHA::6}
        echo "[INFO] COMMIT_SHA=$COMMIT_SHA"
        echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV

    - name: Setup Python
      if: ${{ inputs.language == 'python' }}
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.version }}

    - name: Setup Node.js
      if: ${{ inputs.language == 'nodejs' }}
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.version }}

    - name: Package Lambda function
      shell: bash
      run: |
        set -e
        echo "[INFO] Packaging Lambda function for ${{ inputs.language }}"
        echo "[INFO] Working directory: $(pwd)"
        ls -al

        if [[ "${{ inputs.language }}" == "python" ]]; then
          echo "[INFO] Installing Python dependencies from requirements.txt"
          mkdir -p package
          pip3 install --target ./package -r requirements.txt
          echo "[INFO] Zipping Python dependencies"
          (cd package && zip -r ../${function_name}_${COMMIT_SHA}.zip .)
          echo "[INFO] Adding Python source files to zip"
          zip -g ${function_name}_${COMMIT_SHA}.zip *.py
        elif [[ "${{ inputs.language }}" == "nodejs" ]]; then
          echo "[INFO] Installing Node.js dependencies"
          npm install
          echo "[INFO] Zipping Node.js project"
          # Exclude the zip file itself if it's created in the current directory, and other unnecessary files
          zip -r ${function_name}_${COMMIT_SHA}.zip . -x "*.zip" "package-lock.json" "README.md"
        else
          echo "[ERROR] Unsupported language: ${{ inputs.language }}. Please use 'python' or 'nodejs'."
          exit 1
        fi
        
        echo "[INFO] Listing files after zipping:"
        ls -al
      working-directory: ${{ inputs.workdir }}
      env:
        function_name: ${{ inputs.function_name }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: arn:aws:iam::${{ inputs.aws_account_id }}:role/${{ inputs.aws_iam_role }}

    - run: aws sts get-caller-identity # This step is fine, aws cli will exit non-zero on error
      shell: bash

    - name: Publish function
      shell: bash
      run: |
        set -e
        TARGET_ZIP=${function_name}_${COMMIT_SHA}.zip
        echo "[INFO] function_name=${function_name} lambda_bucket=${lambda_bucket} TARGET_ZIP=${TARGET_ZIP} workdir=${workdir}"
        echo "[INFO] Listing files before S3 upload in $(pwd):"
        ls -al
        aws s3 cp ${TARGET_ZIP} s3://${lambda_bucket}/
        echo "[INFO] Verifying file on S3"
        aws s3 ls s3://${lambda_bucket}/${TARGET_ZIP}
        echo "[INFO] Updating Lambda function code"
        aws lambda update-function-code --function-name ${function_name} --s3-bucket ${lambda_bucket} --s3-key ${TARGET_ZIP} --publish
        echo "[INFO] Waiting for Lambda function to be active"
        aws lambda wait function-active-v2 --function-name ${function_name}
        echo "[INFO] Waiting for Lambda function to be updated"
        aws lambda wait function-updated-v2 --function-name ${function_name}
        # The 'published-version-active' waiter might be redundant if 'function-active-v2' and 'function-updated-v2' cover the state.
        # However, keeping it if it serves a specific purpose for published versions.
        echo "[INFO] Waiting for published version to be active"
        aws lambda wait published-version-active --function-name ${function_name} --qualifier $(aws lambda publish-version --function-name ${function_name} | jq -r .Version)
        echo "[INFO] Lambda deployment complete."
      env:
        lambda_bucket: ${{ inputs.lambda_bucket }}
        function_name: ${{ inputs.function_name }}
        # workdir is available as GITHUB_WORKSPACE or inputs.workdir, not needed as env var for the script itself if working-directory is set.
      working-directory: ${{ inputs.workdir }}
