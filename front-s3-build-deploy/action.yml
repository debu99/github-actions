name: S3 Build and Copy

inputs:
  aws_account_id:
    required: true
    description: 'The AWS account ID'
  aws_region:
    required: false
    description: 'The AWS region to deploy'
    default: 'us-west-2'
  iam_role:
    required: true
    description: 'The IAM role to assume'
  node_version:
    required: false
    description: 'The version of Node.js to use'
    default: '18'
  s3_bucket:
    required: true
    description: 'The S3 bucket to store the build artifacts'
  artifacts_folder:
    required: false
    description: 'The folder containing the build artifacts'
    default: 'build'
  including_folder_name:
    required: false
    description: 'Whether to include the folder name in the S3 path'
    default: 'false'
  cloudfront_distribution_id:
    required: false
    description: 'The CloudFront distribution ID to invalidate'
    default: ''
  package_manager:
    required: false
    description: 'The package manager to use'
    default: 'yarn'
  run_lint:
    required: false
    description: 'Whether to run lint'
    default: 'false'
  run_test:
    required: false
    description: 'Whether to run test'
    default: 'false'
  s3_copy:
    required: false
    description: 'Whether to use S3 copy instead of S3 sync'
    default: 'true'

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: arn:aws:iam::${{ inputs.aws_account_id }}:role/${{ inputs.iam_role }}

    - run: aws sts get-caller-identity
      shell: bash

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Build Project
      run: |
        set -e # Exit immediately if a command exits with a non-zero status.

        echo "[INFO] Detected package manager: ${{ inputs.package_manager }}"

        if [[ "${{ inputs.package_manager }}" == "yarn" ]]; then
          yarn install
          if [[ "${{ inputs.run_lint }}" == "true" ]]; then
            yarn lint
          fi
          if [[ "${{ inputs.run_test }}" == "true" ]]; then
            yarn test
          fi
          yarn build
        elif [[ "${{ inputs.package_manager }}" == "npm" ]]; then
          npm install
          if [[ "${{ inputs.run_lint }}" == "true" ]]; then
            npm run lint
          fi
          if [[ "${{ inputs.run_test }}" == "true" ]]; then
            npm run test
          fi
          npm run build
        else
          echo "[ERROR] Unsupported package manager: ${{ inputs.package_manager }}. Please use 'yarn' or 'npm'."
          exit 1
        fi
      shell: bash

    - name: Sync to S3
      run: |
        set -e # Exit immediately if a command exits with a non-zero status.

        echo "[INFO] Syncing from artifacts folder: ${{ inputs.artifacts_folder }}"
        echo "[INFO] Target S3 bucket: ${{ inputs.s3_bucket }}"
        echo "[INFO] Including folder name in S3 path: ${{ inputs.including_folder_name }}"
        echo "[INFO] Using S3 sync (s3_copy input is deprecated): ${{ inputs.s3_copy }}"

        input_folders=${{ inputs.artifacts_folder }}
        # Assuming artifacts_folder can be a single folder name, not comma-separated for sync
        # If multiple folders need to be synced, this script would need adjustment or multiple sync steps.
        # For simplicity, this refactor assumes artifacts_folder is a single build output directory.
        
        if [[ ! -d "${input_folders}" ]]; then
          echo "[ERROR] Artifacts folder '${input_folders}' does not exist."
          exit 1
        fi

        if [[ "${{ inputs.including_folder_name }}" == "true" ]]; then
          target_path="s3://${{inputs.s3_bucket}}/${input_folders}"
        else
          target_path="s3://${{inputs.s3_bucket}}"
        fi

        echo "[INFO] Syncing to target path: ${target_path}"
        aws s3 sync ${{ inputs.artifacts_folder }} ${target_path} --delete

        echo "[INFO] S3 sync complete."
      shell: bash

    - name: Invalidate CloudFront
      if: ${{ inputs.cloudfront_distribution_id != '' }}
      run: |
        RET=`aws cloudfront create-invalidation --distribution-id ${{ inputs.cloudfront_distribution_id }} --paths "/*"`
        INVALIDATION_ID=`echo $RET | jq -r '.Invalidation.Id'`
        aws cloudfront wait invalidation-completed --id ${INVALIDATION_ID} --distribution-id ${{ inputs.cloudfront_distribution_id }}
        echo "[INFO] Invalidation completed"
      shell: bash
