name: S3 Build and Copy

inputs:
  aws_account_id:
    required: true
    description: 'The AWS account ID'
  aws_region:
    required: false
    description: 'The AWS region to deploy'
    default: 'us-west-2'
  iam_role:
    required: true
    description: 'The IAM role to assume'
  node_version:
    required: false
    description: 'The version of Node.js to use'
    default: '18'
  s3_bucket:
    required: true
    description: 'The S3 bucket to store the build artifacts'
  artifacts_folder:
    required: false
    description: 'The folder containing the build artifacts'
    default: 'build'
  including_folder_name:
    required: false
    description: 'Whether to include the folder name in the S3 path'
    default: 'false'
  cloudfront_distribution_id:
    required: false
    description: 'The CloudFront distribution ID to invalidate'
    default: ''
  package_manager:
    required: false
    description: 'The package manager to use (npm, yarn, or pnpm)'
    default: 'yarn'
  run_lint:
    required: false
    description: 'Whether to run lint'
    default: 'false'
  run_test:
    required: false
    description: 'Whether to run test'
    default: 'false'
  s3_copy:
    required: false
    description: 'Whether to use S3 copy instead of S3 sync'
    default: 'true'
  npm_github_token:
    required: false
    description: 'Token for private packages from GitHub npm registry (npm.pkg.github.com). Use secrets.GITHUB_TOKEN for same repo, or a PAT with read:packages for other orgs/repos. Leave empty if no private GitHub packages.'
  working_directory:
    required: false
    description: 'Directory containing package.json and build artifacts, relative to the workspace root (e.g. frontend for a monorepo). Defaults to the repository root.'
    default: '.'

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: arn:aws:iam::${{ inputs.aws_account_id }}:role/${{ inputs.iam_role }}

    - run: aws sts get-caller-identity
      shell: bash

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Enable pnpm
      if: ${{ inputs.package_manager == 'pnpm' }}
      run: corepack enable pnpm
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: Configure GitHub npm registry auth
      if: ${{ inputs.npm_github_token != '' }}
      run: |
        echo "//npm.pkg.github.com/:_authToken=${NPM_GITHUB_TOKEN}" >> .npmrc
      env:
        NPM_GITHUB_TOKEN: ${{ inputs.npm_github_token }}
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: Yarn install
      if: ${{ inputs.package_manager == 'yarn' }}
      run: yarn install
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: Yarn Build
      if: ${{ inputs.package_manager == 'yarn' }}
      run: yarn build
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: NPM install
      if: ${{ inputs.package_manager == 'npm' }}
      run: npm install
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: NPM Lint
      if: ${{ inputs.package_manager == 'npm' && inputs.run_lint == 'true' }}
      run: npm run lint
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: NPM Test
      if: ${{ inputs.package_manager == 'npm' && inputs.run_test == 'true' }}
      run: npm run test
      working-directory: ${{ inputs.working_directory }}
      shell: bash
    
    - name: NPM Build
      if: ${{ inputs.package_manager == 'npm' }}
      run: npm run build
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: pnpm install
      if: ${{ inputs.package_manager == 'pnpm' }}
      run: pnpm install
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: pnpm Lint
      if: ${{ inputs.package_manager == 'pnpm' && inputs.run_lint == 'true' }}
      run: pnpm run lint
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: pnpm Test
      if: ${{ inputs.package_manager == 'pnpm' && inputs.run_test == 'true' }}
      run: pnpm run test
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: pnpm Build
      if: ${{ inputs.package_manager == 'pnpm' }}
      run: pnpm run build
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: S3 Copy
      run: |
        ls -al
        input_folders=${{ inputs.artifacts_folder }}
        folders=(`echo ${input_folders//,/$' '}`)
        for folder in "${folders[@]}"; do
          echo "[INFO] folder=$folder"
          if [[ -d "${folder}" ]]; then
            echo "[INFO] ${folder} exists"
          else
            echo "[ERROR] ${folder} does not exist"
            exit 1
          fi
          if [[ "${{ inputs.including_folder_name }}" == "true" ]]; then
            target_path=${{inputs.s3_bucket}}/${folder}
          else
            target_path=${{inputs.s3_bucket}}
          fi
          if [[ $S3_COPY == 'true' ]]; then
            echo "[INFO] S3 copy non-js ..."
            aws s3 cp ${folder} s3://${target_path}/ --recursive --exclude "*.js"
            echo "[INFO] S3 copy js ..."
            aws s3 cp ${folder} s3://${target_path}/ --recursive --exclude "*" --include "*.js" --content-type "application/javascript"
          else
            echo "[INFO] S3 sync non-js ..."
            aws s3 sync ${folder} s3://${target_path}/ --exclude "*.js" --delete
            echo "[INFO] S3 sync js ..."
            aws s3 sync ${folder} s3://${target_path}/ --exclude "*" --include "*.js" --content-type "application/javascript" --delete
          fi
        done
      env: 
        S3_COPY: ${{ inputs.s3_copy }}
      working-directory: ${{ inputs.working_directory }}
      shell: bash

    - name: Invalidate CloudFront
      if: ${{ inputs.cloudfront_distribution_id != '' }}
      run: |
        RET=`aws cloudfront create-invalidation --distribution-id ${{ inputs.cloudfront_distribution_id }} --paths "/*"`
        INVALIDATION_ID=`echo $RET | jq -r '.Invalidation.Id'`
        aws cloudfront wait invalidation-completed --id ${INVALIDATION_ID} --distribution-id ${{ inputs.cloudfront_distribution_id }}
        echo "[INFO] Invalidation completed"
      working-directory: ${{ inputs.working_directory }}
      shell: bash
