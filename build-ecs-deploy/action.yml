name: ECS Build and Copy

inputs:
  env:
    required: false
    description: 'The environment to deploy to (e.g., dev, prod)'
    default: ''
  aws_region:
    required: false
    description: 'The AWS region to deploy'
    default: 'us-west-2'
  aws_iam_role:
    required: true
    description: 'The IAM role to assume for AWS operations'
  docker_context:
    required: false
    description: 'The Docker context directory'
    default: '.'
  docker_file:
    required: false
    description: 'The Dockerfile to use for building the image'
    default: 'Dockerfile'
  docker_secrets:
    description: "List of secrets to expose to the build (e.g., key=string, GIT_AUTH_TOKEN=mytoken)"
    required: false
  docker_build_args:
    description: "List of args to build with"
    required: false
    default: ''
  ecr_repository:
    required: false
    description: 'The ECR repository name where the image will be pushed'
  ecs_task_definition_name:
    required: true
    description: 'The name of the ECS task definition to update'
  ecs_container_name:
    required: true
    description: 'The name of the container in the ECS task definition to update'
  ecs_cluster_name:
    required: true
    description: 'The name of the ECS cluster where the service is running'
  ecs_service_name:
    required: true
    description: 'The name of the ECS service to update'

outputs:
  image_name:
    description: 'The full name of the built Docker image'
    value: ${{ steps.compose-image-name.outputs.image_name }}
  image_latest_name:
    description: 'The full name of the latest Docker image'
    value: ${{ steps.compose-image-name.outputs.image_latest_name }}
  image_tag:
    description: 'The tag of the built Docker image'
    value: ${{ steps.compose-image-name.outputs.image_tag }}
  image_latest_tag:
    description: 'The tag of the latest Docker image'
    value: ${{ steps.compose-image-name.outputs.image_latest_tag }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: ${{ inputs.aws_iam_role }}
        role-session-name: ${{ github.event.repository.name }}-${{ github.job }}

    - run: aws sts get-caller-identity
      shell: bash

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - uses: actions/checkout@v4
  
    - name: Compose image name
      id: compose-image-name
      run: |
        GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
        BRANCH_NAME=${GITHUB_REF##*/}
        BRANCH_NAME=$(echo "$BRANCH_NAME" | tr -d '/')
        if [[ ! -z ${{ inputs.env }} ]]; then
          TAG_PREFIX=${{inputs.env}}_$(date +'%Y%m%d_%H%M%S')
        else
          TAG_PREFIX=${BRANCH_NAME}
        fi
        IMAGE_TAG=${TAG_PREFIX}_${GITHUB_SHA_SHORT}
        IMAGE_LATEST_TAG=${TAG_PREFIX}_latest
        IMAGE_NAME="${REGISTRY}/${REPO,,}:${IMAGE_TAG}"
        IMAGE_LATEST_NAME="${REGISTRY}/${REPO,,}:${IMAGE_LATEST_TAG}"
        echo "[INFO] IMAGE_NAME=${IMAGE_NAME} IMAGE_LATEST_NAME=${IMAGE_LATEST_NAME}"
        echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
        echo "image_latest_name=${IMAGE_LATEST_NAME}" >> $GITHUB_OUTPUT
        echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        echo "image_latest_tag=${IMAGE_LATEST_TAG}" >> $GITHUB_OUTPUT
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPO: ${{ inputs.ecr_repository }}
      shell: bash

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.docker_file }}
        push: true
        provenance: false
        secrets: ${{ inputs.docker_secrets}}
        build-args: |
          ${{ inputs.docker_build_args }}
        tags: ${{ steps.compose-image-name.outputs.image_name }},${{ steps.compose-image-name.outputs.image_latest_name }}

    - name: Get the Amazon ECS task definition
      run: |
        aws ecs describe-task-definition --include TAGS --task-definition ${ECS_TASK_DEFINITION} | jq '.taskDefinition' > ${ECS_TASK_DEFINITION}.json
        cat ${ECS_TASK_DEFINITION}.json
      env:
        ECS_TASK_DEFINITION: ${{ inputs.ecs_task_definition_name }}
      shell: bash

    - name: Render Amazon ECS task definition with new tag
      id: render-app-container
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ inputs.ecs_task_definition_name }}.json
        container-name: ${{ inputs.ecs_container_name }}
        image: ${{ steps.compose-image-name.outputs.image_name }}

    - name: Show the Amazon ECS task definition
      run: |
        cat ${{ steps.render-app-container.outputs.task-definition }}
      shell: bash

    - name: Record deployment start time
      id: deploy-start-time
      run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Deploy Amazon ECS task definition
      id: deploy-ecs
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        cluster: ${{ inputs.ecs_cluster_name }}
        service: ${{ inputs.ecs_service_name }}
        task-definition: ${{ steps.render-app-container.outputs.task-definition }}
        wait-for-service-stability: true
        force-new-deployment: true
        wait-for-minutes: 10

    # --- Deployment log steps: run whether deploy succeeded, failed, or timed out ---
    # These steps use the deploy step id so they run only when we actually attempted a deploy.
    # They never fail the job (best-effort) so you always get logs for debugging.

    - name: Show ECS deployment logs (service events)
      if: always() && steps.deploy-ecs.outcome != 'skipped'
      run: |
        # ECS service-level events (e.g. "has reached steady state", "unable to place task").
        # Shows the last 50 events so you can see what happened during this deployment.
        echo "=== ECS service events (last 50) ==="
        aws ecs describe-services \
          --cluster "${{ inputs.ecs_cluster_name }}" \
          --services "${{ inputs.ecs_service_name }}" \
          --query 'services[0].events[:50]' \
          --output table \
          --region "${{ inputs.aws_region }}" || true
      shell: bash

    - name: Show CloudWatch logs for this deployment's tasks
      if: always() && steps.deploy-ecs.outcome != 'skipped'
      env:
        TASK_DEF_ARN: ${{ steps.deploy-ecs.outputs.task-definition-arn }}
        DEPLOY_START: ${{ steps.deploy-start-time.outputs.started_at }}
        CLUSTER: ${{ inputs.ecs_cluster_name }}
        SERVICE: ${{ inputs.ecs_service_name }}
        CONTAINER: ${{ inputs.ecs_container_name }}
        REGION: ${{ inputs.aws_region }}
      run: |
        # Show CloudWatch container logs only for tasks that belong to THIS deployment
        # (the task definition we just deployed). Includes:
        # - On success: the RUNNING tasks that are now serving traffic.
        # - On failure/timeout: the STOPPED tasks that ran the new version before rollback.
        # We filter by task definition ARN + startedAt >= deploy start time (recorded
        # before the deploy step) so we don't show logs from the previous version after ECS rolls back.

        if [[ -z "$TASK_DEF_ARN" ]]; then
          echo "No task definition ARN (deploy may have failed before register); skipping CloudWatch logs."
          exit 0
        fi

        # Read log configuration from the deployed task definition (awslogs group and stream prefix).
        TD_JSON=$(aws ecs describe-task-definition --task-definition "$TASK_DEF_ARN" --region "$REGION" --query 'taskDefinition' --output json)
        LOG_DRIVER=$(echo "$TD_JSON" | jq -r --arg c "$CONTAINER" '.containerDefinitions[] | select(.name == $c) | .logConfiguration.logDriver // empty')
        if [[ "$LOG_DRIVER" != "awslogs" ]]; then
          echo "Container '$CONTAINER' does not use awslogs (logDriver=$LOG_DRIVER); skipping CloudWatch logs."
          exit 0
        fi
        LOG_GROUP=$(echo "$TD_JSON" | jq -r --arg c "$CONTAINER" '.containerDefinitions[] | select(.name == $c) | .logConfiguration.options["awslogs-group"] // empty')
        STREAM_PREFIX=$(echo "$TD_JSON" | jq -r --arg c "$CONTAINER" '.containerDefinitions[] | select(.name == $c) | .logConfiguration.options["awslogs-stream-prefix"] // "ecs"')
        if [[ -z "$LOG_GROUP" ]]; then
          echo "No awslogs-group for container '$CONTAINER'; skipping CloudWatch logs."
          exit 0
        fi
        # Support both log group name and full ARN (e.g. arn:aws:logs:region:account:log-group:/path/name:*).
        # API expects ARN without the trailing :* ; --log-group-name accepts only the name, --log-group-identifier accepts name or ARN.
        if [[ "$LOG_GROUP" == arn:aws:logs:* ]]; then
          LOG_GROUP_PARAM="--log-group-identifier"
          LOG_GROUP_VAL="${LOG_GROUP%:\*}"
        else
          LOG_GROUP_PARAM="--log-group-name"
          LOG_GROUP_VAL="$LOG_GROUP"
        fi

        # Find tasks from this deployment: same task definition ARN, started at or after our deploy start time.
        # This yields RUNNING tasks after a successful deploy, and STOPPED tasks after a failed deploy.
        TASK_ARNS=()
        while IFS= read -r arn; do [[ -n "$arn" ]] && TASK_ARNS+=("$arn"); done < <(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" --desired-status RUNNING --region "$REGION" --query 'taskArns[]' --output text)
        while IFS= read -r arn; do [[ -n "$arn" ]] && TASK_ARNS+=("$arn"); done < <(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" --desired-status STOPPED --region "$REGION" --max-items 50 --query 'taskArns[]' --output text)
        if [[ ${#TASK_ARNS[@]} -eq 0 ]]; then
          echo "No tasks found for service $SERVICE; skipping CloudWatch logs."
          exit 0
        fi

        TASKS_JSON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "${TASK_ARNS[@]}" --region "$REGION" --query 'tasks' --output json)
        # Keep only tasks that match our deployment: this task def and started at or after deploy start.
        DEPLOYMENT_TASK_IDS=($(echo "$TASKS_JSON" | jq -r --arg arn "$TASK_DEF_ARN" --arg start "$DEPLOY_START" '
          [.[] | select(.taskDefinitionArn == $arn and (.startedAt != null) and (.startedAt >= $start)) | .taskArn | split("/") | last] | unique[]
        '))
        if [[ ${#DEPLOYMENT_TASK_IDS[@]} -eq 0 ]] || [[ "${DEPLOYMENT_TASK_IDS[0]}" == "null" ]]; then
          echo "No tasks for this deployment (taskDef $TASK_DEF_ARN) started since $DEPLOY_START; showing tasks with this task def anyway."
          DEPLOYMENT_TASK_IDS=($(echo "$TASKS_JSON" | jq -r --arg arn "$TASK_DEF_ARN" '[.[] | select(.taskDefinitionArn == $arn) | .taskArn | split("/") | last] | unique[]'))
        fi

        # ECS awslogs stream name format: {prefix}/{container-name}/{task-id}
        for TASK_ID in "${DEPLOYMENT_TASK_IDS[@]}"; do
          [[ -z "$TASK_ID" ]] || [[ "$TASK_ID" == "null" ]] && continue
          STREAM="${STREAM_PREFIX}/${CONTAINER}/${TASK_ID}"
          echo ""
          echo "=== CloudWatch logs: $LOG_GROUP / $STREAM (task $TASK_ID) ==="
          (aws logs get-log-events $LOG_GROUP_PARAM "$LOG_GROUP_VAL" --log-stream-name "$STREAM" --region "$REGION" --limit 500 --output json 2>/dev/null | jq -r '.events[]? | .message') || echo "(no events or stream not found)"
        done
        exit 0
      shell: bash
